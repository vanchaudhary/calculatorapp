trigger: none

parameters:
- name: workItemIds
  type: string
  default: ''   # example: "75" or "75,76,81"

pool:
  vmImage: ubuntu-latest

steps:
- task: Bash@3
  displayName: "Add GHAS scan comment to ADO work item"
  env:
    SYSTEM_ACCESSTOKEN: $(System.AccessToken)
  inputs:
    targetType: inline
    script: |
      echo "Adding comment to work item $(workItemId)"

      curl -u :$SYSTEM_ACCESSTOKEN \
        -X PATCH \
        -H "Content-Type: application/json-patch+json" \
        "$(System.CollectionUri)$(System.TeamProject)/_apis/wit/workitems/$(workItemId)?api-version=7.0" \
        -d '[
          {
            "op": "add",
            "path": "/fields/System.History",
            "value": "✅ GHAS CodeQL scan triggered by Azure Pipeline run $(Build.BuildNumber). Results available in GitHub Security tab."
          }
        ]'