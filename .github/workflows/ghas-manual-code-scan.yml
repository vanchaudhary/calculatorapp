name: GHAS Demo - Manual Trigger

run-name: GHAS scan (WIs: ${{ inputs.workItemIds }}) by @${{ github.actor }}

on:
  workflow_dispatch:
    inputs:
      workItemIds:
        description: "Azure DevOps Work Item IDs (comma-separated)"
        required: false
        default: ""

jobs:
  analyze:
    name: CodeQL Analysis
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript' ]

    steps:
      - name: Show Work Item IDs
        run: echo "Work Item IDs: ${{ inputs.workItemIds }}"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
